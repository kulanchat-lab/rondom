name: iOS Build

# Silent compile-check on free public macOS minutes. Clones the private app,
# builds for the simulator (no signing). Output suppressed; errors only on failure.
on:
  workflow_dispatch:

concurrency:
  group: ios-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Clone private source
        run: git clone --depth 1 "${{ secrets.CLONE_URL }}" app >/dev/null 2>&1

      - name: Select Xcode + tools
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          sudo xcode-select -s "$LATEST/Contents/Developer" >/dev/null 2>&1
          brew install xcodegen >/dev/null 2>&1

      - name: Compile (simulator, no signing; errors only on failure)
        working-directory: app
        run: |
          xcodegen generate >/dev/null 2>&1
          xcodebuild -resolvePackageDependencies -project Kulan.xcodeproj -scheme Kulan >/dev/null 2>&1
          if xcodebuild build -project Kulan.xcodeproj -scheme Kulan \
               -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
               -skipPackagePluginValidation -skipMacroValidation CODE_SIGNING_ALLOWED=NO \
               > "$RUNNER_TEMP/out.log" 2>&1; then
            echo "build ok"
          else
            echo "::error::compile failed"
            grep -iE "error:" "$RUNNER_TEMP/out.log" | tail -40
            exit 1
          fi
