name: TestFlight

# Blind public CI: holds NO source. Clones the private app at build time
# (CLONE_URL carries a read-only token), builds, uploads to TestFlight.
# Output is a black hole — steps are silenced; on failure only error lines surface
# so a broken build stays fixable. Public repo = free macOS minutes.
on:
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
    steps:
      - name: Clone private source
        run: git clone --depth 1 "${{ secrets.CLONE_URL }}" app >/dev/null 2>&1

      - name: Select Xcode + tools
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          sudo xcode-select -s "$LATEST/Contents/Developer" >/dev/null 2>&1
          brew install xcodegen >/dev/null 2>&1

      - name: Signing material
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
        run: |
          {
            printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"
            echo "$DIST_P12_BASE64" | openssl base64 -d -A > "$RUNNER_TEMP/dist.p12"
            KC="$RUNNER_TEMP/build.keychain-db"
            security create-keychain -p "" "$KC"
            security set-keychain-settings -lut 21600 "$KC"
            security unlock-keychain -p "" "$KC"
            security import "$RUNNER_TEMP/dist.p12" -k "$KC" -P "$DIST_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
            security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KC"
            security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          } >/dev/null 2>&1

      - name: Build & upload (silent; errors only on failure)
        working-directory: app
        env:
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "180"
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
        run: |
          echo "BUILD_NUMBER=$(date +%s)" >> "$GITHUB_ENV"
          export BUILD_NUMBER=$(date +%s)
          xcodegen generate >/dev/null 2>&1
          xcodebuild -resolvePackageDependencies -project Kulan.xcodeproj -scheme Kulan >/dev/null 2>&1
          if fastlane beta > "$RUNNER_TEMP/out.log" 2>&1; then
            echo "uploaded"
          else
            echo "::error::build/upload failed"
            grep -iE "error:|❌|finished with errors|could not|invalid" "$RUNNER_TEMP/out.log" | tail -40
            exit 1
          fi
