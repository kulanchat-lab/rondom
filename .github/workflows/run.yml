name: run

on:
  workflow_dispatch:
    inputs:
      m:
        default: a

concurrency:
  group: run
  cancel-in-progress: false

jobs:
  run:
    runs-on: macos-15
    timeout-minutes: 75
    env:
      GH_TOKEN: ${{ github.token }}
      BASE_URL: ${{ secrets.BASE_URL }}
      CFG_A1: ${{ secrets.CFG_A1 }}
      CFG_A2: ${{ secrets.CFG_A2 }}
      CFG_A3: ${{ secrets.CFG_A3 }}
      CFG_B1: ${{ secrets.CFG_B1 }}
      CFG_B2: ${{ secrets.CFG_B2 }}
      CFG_B3: ${{ secrets.CFG_B3 }}
      M: ${{ github.event.inputs.m }}
    steps:
      - run: git clone --depth 1 "$BASE_URL" w >/dev/null 2>&1

      # Reuse downloaded packages + build output between runs (the slow part).
      - uses: actions/cache@v4
        with:
          path: |
            ~/spm
            ~/Library/Developer/Xcode/DerivedData
          key: k-${{ env.M }}-${{ hashFiles('w/project.yml') }}
          restore-keys: |
            k-${{ env.M }}-
            k-

      - run: bash w/.ci/run.sh "$M"
